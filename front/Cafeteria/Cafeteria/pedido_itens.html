<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Pedido Itens</title>
</head>
<body>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="categorias.html">Categorias</a></li>
        <li><a href="produtos.html">Produtos</a></li>
        <li><a href="pedidos.html">Pedidos</a></li>
    </ul>

    <div class="formulario">
        <h2 id="pedidoInfo"></h2>
        <h3>Cadastro de Pedido Itens</h3>

        <label for="produto_id">Produto</label>
        <select id="produto_id" name="produto_id">
            <option value="">Selecione um produto</option>
        </select>

        <label for="quantidade">Quantidade</label>
        <input type="number" id="quantidade" name="quantidade">

        <button type="button" id="botaoEnviar" class="button">Cadastrar</button>
    </div>

    <div class="tabela">
        <h3>Itens do Pedido</h3>
        <table border="1">
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Quantidade</th>
                    <th>Preço unitário</th>
                    <th>Subtotal</th>
                </tr>
            </thead>
            <tbody id="cpTabelaItens"></tbody>
        </table>
        <p>Total: <strong id="totalGeral">R$ 0,00</strong></p>
    </div>

    <div id="resposta" class="tabela"></div>
</body>
<script src="./assets/js/pedido_itens.js"></script>
</html>
