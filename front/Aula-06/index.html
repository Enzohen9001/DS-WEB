<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initia
l-scale=1.0">
<title>Formulário - Prática de Validação JS</title>
<link rel="stylesheet" href="style.css">
</head>
<style>
span{
color: red;
}
</style>
<body>
<h1>Formulário de Cadastro</h1>
<p>Preencha todos os campos e clique em Enviar.</p>
<form id="formulario" onsubmit="return formulario()">
    <label for="nome">Nome:</label>
<input type="text" id="nome" name="nome" placeholder
="Ex: Maria Silva">
<span id="erro_nome"></span>
<br>
<br>
<label for="email">E-mail:</label>
<input type="text" id="email" name="email" placeholder="Ex: maria@email.com">
<span id="erro_email"></span>
<br>
<br>
<label for="senha">Senha:</label>
<input type="password" id="senha" name="senha" placeh
older="Mínimo 8 caracteres">
<span id="erro_senha"></span>
<br>
<label for="confirma_senha">Confirmar senha:</label>
<input type="password" id="confirma_senha" name="conf
irma_senha" placeholder="Repita a senha">
<span id="erro_confirma_senha"></span>
<br>
<br>
<label for="cpf">CPF:</label>
<input type="text" id="cpf" name="cpf" placeholder="E
x: 000.000.000-00" maxlength="14">
<span id="erro_cpf"></span>
<br>
<br>
<label for="telefone">Telefone:</label>
<input type="text" id="telefone" name="telefone" placeholder="Ex: (11) 99999-9999" maxlength="15">
<span id="erro_telefone"></span>
<br>
<br>
<label for="cep">CEP:</label>
<input type="text" id="cep" name="cep" placeholder="Ex: 01310-100" maxlength="9">
<span id="erro_cep"></span>
<br>
<br>
<label for="data_nascimento">Data de nascimento:</label>
<input type="text" id="data_nascimento" name="data_na
scimento" placeholder="Ex: 31/12/1990" maxlength="10">
<span id="erro_data_nascimento"></span>
<br>
<br>
<label for="valor">Valor:</label>
<input type="text" id="valor" name="valor" 
placeholder="Ex: 1.299,90">
<span id="erro_valor"></span>
<br>
<br>
<label for="url">URL:</label>
<input type="text" id="url" name="url" placeholder="E
x: https://meusite.com.br">
<span id="erro_url"></span>
<br>
<br>
<label for="cartao">Número do cartão:</label>
<input type="text" id="cartao" name="cartao" placehol
der="Ex: 4111 1111 1111 1111" maxlength="19">
<span id="erro_cartao"></span>
<br>
<br>
<button type="submit">Enviar</button>
<button type="reset">Limpar</button>
</form>
<hr>
<div id="resultado"></div>
</form>
</body>
<script src="script.js"></script>
</html>
